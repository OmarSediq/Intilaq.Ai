version: "3.8"

services:
  mongodb:
    image: mongo
    container_name: mongodb-container
    networks:
      - my_network
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis
    container_name: redis-container
    networks:
      - my_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres
    container_name: postgres-container
    networks:
      - my_network
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  speech_to_text_service:
    build:
      context: ./speech_to_text_service
      dockerfile: Dockerfile
    container_name: stt-container
    networks:
      - my_network
    ports:
      - "5001:5001"
    volumes:
      - whisper_model_cache:/whisper_model
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - postgres
    restart: always
    command: ["uvicorn", "speech_to_text_service.app.main:app", "--host", "0.0.0.0", "--port", "5001"]


  fastapi:
    image: intilaqai-fastapi
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: fastapi-container
    networks:
      - my_network
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - .env
    depends_on:
      - speech_to_text_service
      - mongodb
      - redis
      - postgres
    restart: always
    volumes:
      - .:/app
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]

  nginx:
    image: nginx
    container_name: nginx-container
    restart: always
    depends_on:
      - fastapi
    ports:
    - "8443:443"
    - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs
    networks:
      - my_network
  rq_worker:
    image: intilaqai-fastapi   # استخدم صورة FastAPI المبنية مسبقًا
    container_name: rq-worker
    depends_on:
      - redis
      - mongodb
    networks:
      - my_network
    volumes:
      - .:/app
    env_file:
      - .env
    command: ["python", "backend/job_worker/worker.py"]
    # ------------------ Observability services ------------------
  prometheus:
      image: prom/prometheus:latest
      container_name: prometheus-container
      networks:
        - my_network
      volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - prometheus_data:/prometheus
      ports:
        - "9090:9090"
      restart: unless-stopped

  grafana:
      image: grafana/grafana:latest
      container_name: grafana-container
      networks:
        - my_network
      environment:
        - GF_SECURITY_ADMIN_USER=admin
        - GF_SECURITY_ADMIN_PASSWORD=admin
      volumes:
        - grafana_data:/var/lib/grafana
      ports:
        - "3000:3000"
      restart: unless-stopped

  jaeger:
      image: jaegertracing/all-in-one:1.52
      container_name: jaeger-container
      networks:
        - my_network
      ports:
        - "16686:16686"
        - "4317:4317"
        - "6831:6831/udp"
      restart: unless-stopped
networks:
  my_network:

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  whisper_model_cache:
  prometheus_data:
  grafana_data:
