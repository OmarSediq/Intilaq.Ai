<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>create account</title>
  
  <link rel="stylesheet" href="caccount.css">
  <script src="caccount.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="login-box">
      <div class="login-form">
        <img src="images/Intilaq.svg" alt="Logo" class="logo">
        <h2>Welcome Back!</h2>
        <p>Log in to access your sessions and continue your journey</p>
        <form  id="registerForm">
          <label for="Username"><b>Username</b></label>
          <input type="text" id="Username" placeholder="Enter username">
          <label for="Email"><b>Email</b></label>
          <input type="email" id="Email" placeholder="Enter Email">

          

          <label for="password"><b>Password</b></label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter Password">
            <i class=" fas fa-eye-slash toggle-password" id="togglePassword"></i>
          </div>
          
          <label for="confirmPassword"><b>Confirm Password</b></label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <i class="fas fa-eye-slash toggle-password" id="toggleConfirmPassword"></i>
          </div>

          <p id="errorMessage" class="error" style="color: red; display: none;">Passwords do not match!</p>
          
          <button type="button" class="login-btn">create account</button>
          
        </form>
        <span class="sign-up">Have An Account? <a href="../login_page/log.html" style="margin-left: 1px; text-decoration: underline;">login</a></span>
      </div>
    </div>
  </div>

  <div class="login-banner">
    <h1>Join A World Of Endless Opportunities</h1>
    <p>Log in and achieve your career goals.</p>
    <img src="images/interview@2x.svg" alt="Illustration" class="illustration">
  </div>

</body>
</html>
