<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sign in</title>
  
  <link rel="stylesheet" href="sign-in.css">
  <script src="sign-in.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="login-box">
      <div class="login-form">
        <img src="images/Intilaq.svg" alt="Logo" class="logo">
        <h2>Verification successful!</h2>
        <p>Log in to access your sessions and continue your journey build your resume and prepare for interviews.</p>
        <form>
          <label for="Email"><b>Email</b></label>
          <input type="text" id="Email" placeholder="Enter Email">

          <label for="password"><b>Password</b></label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter Password">
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          
          <a href="#" class="forgot-password">Forgot Password?</a>
          <button type="button" class="login-btn">Get Started</button>
        </form>
        
      </div>
    </div>
  </div>

  <div class="login-banner">
    <h1>Join A World Of Endless Opportunities</h1>
    <p>Log in and achieve your career goals.</p>
    <img src="images/Telecommuting-rafiki 2.svg" alt="Illustration" class="illustration">
  </div>

</body>
</html>
