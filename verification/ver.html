<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Page</title>
  <link rel="stylesheet" href="ver.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">


</head>
<body>
  <div class="container">
    <div class="card">
      <img src="images/Intilaq.svg" alt="logo" class="logo">
      <h2>Verification</h2>
      <p>We’ve sent a 6-digit verification code to your email
        
        <span class="email">Your-Email@example.com</span></p>
      <p class="Please" >
        Please Enter The Code Below</p>
      <div class="code-inputs">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
        <input type="text" maxlength="1" class="code-box">
      </div>
      
      <p class="resend-text">
        Didn’t receive the code? <a href="#" class="resend-link"><U>Resend</U></a>
      </p>
    </div>
  </div>
  <script src="ver.js"></script>
</body>
</html>
