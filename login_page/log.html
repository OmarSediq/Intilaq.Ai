<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login page</title>
  
  <link rel="stylesheet" href="log.css">
  <script src="log.js" defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="login-box">
      <div class="login-form">
        <img src="images/Intilaq.svg" alt="Logo" class="logo">
        <h2>Welcome Back!</h2>
        <p>Log in to access your sessions and continue your journey</p>
        <form action="http://localhost:8000/docs" method="POST">

          <label for="Email"><b>Email</b></label>
          <input type="text" id="Email" placeholder="Enter Email" required>

          <label for="password"><b>Password</b></label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter Password" required>
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          
          <a href="#" class="forgot-password">Forgot Password?</a>
          <button type="submit" class="login-btn">Log In</button>
        </form>
        <span class="sign-up">Don't Have An Account? <a href="../create_account/caccount.html" style="margin-left: 1px; text-decoration: underline;">Sign Up</a></span>
      </div>
    </div>
  </div>

  <div class="login-banner">
    <h1>Join A World Of Endless Opportunities</h1>
    <p>Log in and achieve your career goals.</p>
    <img src="images/Telecommuting-rafiki 2.svg" alt="Illustration" class="illustration">
  </div>

</body>
</html>
